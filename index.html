<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#EF6440">
<title>Milo — Milo grows with you</title>
<meta name="description" content="Milo is a gentle, Tamagotchi-style emotional-support companion that grows with you while you practice real calm-and-coping skills. A 3Shamrocks Studio prototype. Private and on-device.">

<!-- CSP: no eval, on-device only. Inline style/script are used because this is a single-file PWA;
     a production build would move to nonce-based CSP. Nothing connects off-device except Google Fonts. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self' https://generativelanguage.googleapis.com https://api.groq.com; worker-src 'self'; manifest-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
/* Palette = the canonical 3Shamrocks Design System brand: [data-brand="milo"]
   — warm cream world, soft sage signature, peach-coral brand hero, warm cocoa
   ink, pillowy 22px. Variable NAMES are kept stable; only the brand VALUES
   change. Safety rule held: NO alarming reds anywhere — warmth/crisis = amber. */
:root{
  --bg1:#FBF3EC; --bg2:#F2EDE4;                                   /* warm cream */
  --card:#FFFCF9; --card-2:#F8F1E9;
  --green:#7BB37B; --green-deep:#5C925C; --green-soft:#E6F0E1;    /* soft sage: companion, growth, safe */
  --blue:#83BFB0; --blue-deep:#56988A; --blue-soft:#DEEFE9;       /* soft teal-sage: calm / breathing */
  --amber:#E6A861; --amber-deep:#C9853F; --amber-soft:#F8E7CE;    /* warm connection: nourish / crisis */
  --coral:#EF6440; --coral-deep:#CF4324; --coral-soft:#FFE0D4;    /* brand hero: warm accents */
  --ink:#3E2E25; --ink-soft:#6E5A4E; --ink-faint:#A28E7C;         /* warm cocoa */
  --line:#EFE3D7;
  --radius:22px; --radius-sm:15px;
  --shadow:0 10px 30px rgba(92,36,26,.10);
  --shadow-sm:0 4px 14px rgba(92,36,26,.08);
  --darkgrey:#2C302F;
}
body{
  font-family:'Nunito',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  color:var(--ink);
  background:linear-gradient(160deg,var(--bg1),var(--bg2));
  background-attachment:fixed;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}
h1,h2,h3,.brand .name,.section,.ob h1,.bhero .bt,.feel .lbl,.sheet h3{
  font-family:'Quicksand',system-ui,-apple-system,sans-serif;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);border:0}

/* ---- shell ---- */
.app{max-width:460px;margin:0 auto;min-height:100vh;position:relative;
  display:flex;flex-direction:column;padding:0 16px 96px;}
@media(min-width:480px){
  .app{margin:18px auto;min-height:calc(100vh - 36px);border-radius:30px;
    background:linear-gradient(180deg,rgba(255,255,255,.5),rgba(255,255,255,.2));
    box-shadow:0 24px 60px rgba(50,80,70,.14);overflow:hidden;padding:0 18px 96px;}
}

/* ---- top bar ---- */
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:16px 2px 8px;position:sticky;top:0;z-index:20;
  background:linear-gradient(180deg,var(--bg1),rgba(233,243,238,0));backdrop-filter:blur(2px)}
.brand{display:flex;align-items:center;gap:9px}
.brand .logo{width:30px;height:30px;flex:0 0 auto}
.brand .name{font-weight:700;font-size:1.18rem;letter-spacing:.3px;color:var(--coral-deep)}
.brand .tline{font-size:.66rem;color:var(--ink-faint);font-weight:600;margin-top:-2px}
.protochip{font-size:.6rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
  color:var(--amber-deep);background:var(--amber-soft);padding:4px 9px;border-radius:99px;border:1px solid #EFD9B7}

/* ---- cards ---- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px;box-shadow:var(--shadow-sm);margin:12px 0}
.card.soft{background:var(--card-2)}
h2.section{font-size:1.06rem;font-weight:700;margin:6px 2px 2px;color:var(--ink)}
.muted{color:var(--ink-soft)}
.faint{color:var(--ink-faint);font-size:.82rem}

/* ---- pet stage ---- */
.petstage{display:flex;flex-direction:column;align-items:center;text-align:center;
  padding:14px 14px 6px;position:relative}
.petwrap{width:200px;height:200px;animation:breathe 5.5s ease-in-out infinite}
.petwrap svg{width:100%;height:100%;overflow:visible}
@keyframes breathe{0%,100%{transform:scale(.985) translateY(2px)}50%{transform:scale(1.025) translateY(-2px)}}
@media (prefers-reduced-motion:reduce){.petwrap{animation:none}}
.bubble{max-width:300px;background:#fff;border:1px solid var(--line);border-radius:18px;
  padding:12px 15px;box-shadow:var(--shadow-sm);font-weight:500;color:var(--ink);
  position:relative;margin-top:6px;animation:rise .5s ease both}
.bubble:after{content:"";position:absolute;top:-9px;left:50%;transform:translateX(-50%) rotate(45deg);
  width:16px;height:16px;background:#fff;border-left:1px solid var(--line);border-top:1px solid var(--line)}
.bubble .who{font-size:.72rem;color:var(--green-deep);font-weight:700;display:block;margin-bottom:2px}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ---- feeling picker ---- */
.feelrow{display:flex;gap:8px;justify-content:space-between;margin-top:10px;flex-wrap:wrap}
.feel{flex:1 1 0;min-width:62px;background:var(--card-2);border:1.5px solid var(--line);
  border-radius:16px;padding:11px 4px 9px;display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:transform .15s ease,border-color .15s ease,background .15s ease}
.feel:hover{transform:translateY(-2px)}
.feel:active{transform:scale(.96)}
.feel.sel{border-color:var(--green);background:var(--green-soft)}
.feel .face{font-size:1.7rem;line-height:1}
.feel .lbl{font-size:.7rem;font-weight:600;color:var(--ink-soft)}
.skiprow{margin-top:10px;text-align:center}
.linkbtn{color:var(--green-deep);font-weight:600;font-size:.85rem;text-decoration:underline;text-underline-offset:3px;background:none}

/* ---- actions grid ---- */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.action{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;
  text-align:left;display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow-sm);
  transition:transform .15s ease,box-shadow .15s ease}
.action:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.action:active{transform:scale(.97)}
.action .ico{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.3rem}
.ic-green{background:var(--green-soft)}.ic-blue{background:var(--blue-soft)}.ic-amber{background:var(--amber-soft)}
.action .t{font-weight:700;font-size:.95rem}
.action .d{font-size:.76rem;color:var(--ink-soft);line-height:1.35}

/* ---- quest ---- */
.quest{background:linear-gradient(150deg,#FBF4E7,#FDF9F0);border:1px solid #F0E3CC}
.quest .qkicker{font-size:.68rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--amber-deep)}
.quest .qtext{font-weight:600;font-size:1.05rem;margin:6px 0 2px}
.btnrow{display:flex;gap:9px;margin-top:13px;flex-wrap:wrap}
.btn{border-radius:14px;padding:11px 16px;font-weight:700;font-size:.92rem;
  transition:transform .12s ease,filter .15s ease;flex:1 1 auto;text-align:center}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--coral);color:#fff;box-shadow:0 4px 0 var(--coral-deep)}
.btn.amber{background:var(--amber);color:#5a3d12;box-shadow:0 4px 0 var(--amber-deep)}
.btn.blue{background:var(--blue);color:#fff;box-shadow:0 4px 0 var(--blue-deep)}
.btn.ghost{background:var(--card-2);color:var(--ink-soft);border:1.5px solid var(--line);box-shadow:none}
.btn.block{width:100%;flex:none}

/* ---- journey ---- */
.arc{display:flex;justify-content:space-between;align-items:flex-end;gap:6px;margin:6px 0 2px}
.arcnode{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;opacity:.4;
  transition:opacity .4s ease,transform .4s ease}
.arcnode.reached{opacity:1}
.arcnode.current{transform:translateY(-4px)}
.arcnode .mini{width:100%;max-width:54px}
.arcnode .mlabel{font-size:.62rem;font-weight:700;color:var(--ink-soft);text-align:center}
.arcnode.current .mlabel{color:var(--green-deep)}
.vine{height:12px;border-radius:99px;background:var(--green-soft);overflow:hidden;margin-top:6px}
.vine>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),var(--amber));
  transition:width 1s cubic-bezier(.2,.9,.3,1)}
.reflectlist{display:flex;flex-direction:column;gap:9px;margin-top:6px}
.reflect{display:flex;align-items:center;gap:11px;background:var(--card-2);border:1px solid var(--line);
  border-radius:14px;padding:11px 13px}
.reflect .n{font-weight:700;font-size:1.15rem;color:var(--green-deep);min-width:26px;text-align:center}
.reflect .x{font-size:.85rem;color:var(--ink-soft)}
.moodtrack{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.mdot{width:13px;height:13px;border-radius:50%;border:1px solid rgba(0,0,0,.04)}

/* ---- learned chips ---- */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.chip{background:var(--green-soft);color:var(--green-deep);border-radius:99px;padding:6px 12px;
  font-size:.8rem;font-weight:600}

/* ---- about ---- */
.note{border-radius:15px;padding:13px 14px;font-size:.86rem;line-height:1.5;margin:10px 0}
.note .nt{font-weight:700;display:block;margin-bottom:3px}
.note.calm{background:var(--blue-soft);border:1px solid #CFE0EC;color:#2C4655}
.note.warm{background:var(--amber-soft);border:1px solid #EFDCBC;color:#6A4B22}
.note.green{background:var(--green-soft);border:1px solid #CDE7DB;color:#2F5648}
.helpcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px;margin-top:9px}
.helpcard .hn{font-weight:700}
.helpcard .hd{font-size:.83rem;color:var(--ink-soft)}
.needsverify{display:inline-block;font-size:.62rem;font-weight:700;letter-spacing:.4px;text-transform:uppercase;
  color:#8a5a00;background:#FBEAC6;border:1px solid #E8D199;border-radius:99px;padding:2px 8px;margin-left:6px}

/* ---- studio footer ---- */
.studio{margin:18px 0 6px;text-align:center}
.logochip{display:inline-flex;align-items:center;justify-content:center;background:var(--darkgrey);
  border-radius:14px;padding:11px 16px;box-shadow:var(--shadow-sm)}
.logochip img{height:26px;display:block}
.studio .tm{font-size:.78rem;font-weight:700;color:var(--ink-soft);margin-top:9px}
.studio .cp{font-size:.7rem;color:var(--ink-faint);margin-top:3px}

/* ---- tab bar ---- */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;justify-content:center;
  pointer-events:none}
.tabbar .inner{pointer-events:auto;display:flex;gap:4px;background:rgba(255,255,255,.86);
  backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:22px;padding:6px;
  margin-bottom:14px;box-shadow:var(--shadow);width:min(420px,calc(100% - 32px));justify-content:space-around}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 4px;border-radius:16px;
  color:var(--ink-faint);font-size:.68rem;font-weight:700;transition:color .15s,background .15s}
.tab .ti{font-size:1.15rem;line-height:1}
.tab.on{color:var(--green-deep);background:var(--green-soft)}

/* ---- overlay (gentle modals) ---- */
.overlay{position:fixed;inset:0;z-index:50;background:rgba(40,60,52,.42);backdrop-filter:blur(3px);
  display:flex;align-items:flex-end;justify-content:center;animation:fade .25s ease both}
@media(min-width:480px){.overlay{align-items:center}}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{background:var(--card);width:min(460px,100%);max-height:92vh;overflow:auto;
  border-radius:26px 26px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));
  box-shadow:0 -10px 40px rgba(40,60,52,.2);animation:slideup .35s cubic-bezier(.2,.9,.3,1) both}
@media(min-width:480px){.sheet{border-radius:26px}}
@keyframes slideup{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.sheet h3{margin:2px 0 4px;font-size:1.18rem}
.grab{width:42px;height:5px;border-radius:99px;background:var(--line);margin:0 auto 12px}

/* ---- breathing (co-regulation: the pet breathes WITH the child) ---- */
.breathscene{display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;padding:6px 0 4px}
.breathwrap{position:relative;width:230px;height:230px;display:flex;align-items:center;justify-content:center;margin:2px auto}
.breathorb{position:absolute;width:190px;height:190px;border-radius:50%;
  background:radial-gradient(circle at 50% 40%,#CFEAF6,#9FC8DE);box-shadow:0 0 0 16px rgba(159,200,222,.16),0 0 0 34px rgba(159,200,222,.09);
  transform:scale(.55);transition:transform 4s ease-in-out;will-change:transform}
.breathpet{position:relative;z-index:1;width:150px;height:150px;animation:none !important;
  transform:scale(.78);transition:transform 4s ease-in-out;will-change:transform}
.breathpet svg{width:100%;height:100%;overflow:visible}
.breathlabel{font-size:1.25rem;font-weight:700;color:var(--blue-deep);min-height:1.5em}
.breathcount{font-size:.82rem;color:var(--ink-faint);font-weight:600}
.breathopts{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:2px}
.buzztoggle{display:inline-flex;align-items:center;gap:7px;background:var(--card-2);border:1.5px solid var(--line);
  border-radius:99px;padding:6px 13px;font-size:.78rem;font-weight:600;color:var(--ink-soft)}
.buzztoggle.on{border-color:var(--blue);background:var(--blue-soft);color:var(--blue-deep)}
.buzztoggle .dot{width:9px;height:9px;border-radius:50%;background:var(--ink-faint)}
.buzztoggle.on .dot{background:var(--blue-deep)}
@media (prefers-reduced-motion:reduce){.breathorb,.breathpet{transition-duration:.4s !important}}

/* ---- breathe hero (the lead feature) ---- */
.bhero{background:linear-gradient(150deg,#E6F3FB,#EAF6F1);border:1px solid #CFE6F1;
  border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm);margin:12px 0;
  display:flex;align-items:center;gap:14px;text-align:left;width:100%;
  transition:transform .15s ease,box-shadow .15s ease}
.bhero:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.bhero:active{transform:scale(.99)}
.bhero .bico{width:62px;height:62px;flex:0 0 auto;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:1.9rem;background:radial-gradient(circle at 50% 40%,#CFEAF6,#9FC8DE);
  box-shadow:0 0 0 8px rgba(159,200,222,.16);animation:herobreathe 5.5s ease-in-out infinite}
@keyframes herobreathe{0%,100%{transform:scale(.94)}50%{transform:scale(1.04)}}
@media (prefers-reduced-motion:reduce){.bhero .bico{animation:none}}
.bhero .bt{font-weight:700;font-size:1.05rem;color:var(--blue-deep)}
.bhero .bk{font-size:.64rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--blue);margin-bottom:1px}
.bhero .bd{font-size:.82rem;color:var(--ink-soft);line-height:1.4;margin-top:2px}

/* onboarding */
.ob{padding-top:8px;animation:rise .4s ease both}
.ob h1{font-size:1.7rem;margin:6px 0 2px;color:var(--green-deep)}
.ob .lead{font-size:1rem;color:var(--ink-soft)}
.input{width:100%;border:1.5px solid var(--line);border-radius:14px;padding:13px 14px;font-size:1rem;
  font-family:inherit;color:var(--ink);background:#fff;margin-top:8px}
.input:focus{outline:none;border-color:var(--green)}
.suggrow{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
.sugg{background:var(--card-2);border:1.5px solid var(--line);border-radius:99px;padding:7px 13px;font-weight:600;font-size:.85rem;color:var(--ink-soft)}
.sugg:active{transform:scale(.96)}
.dots{display:flex;gap:6px;justify-content:center;margin:14px 0 2px}
.dots i{width:7px;height:7px;border-radius:50%;background:var(--line)}
.dots i.on{background:var(--green);width:18px;border-radius:99px}

/* celebrate */
.celebrate{text-align:center}
.celebrate .spark{font-size:2.2rem}

/* M.I.L.O. acrostic — the quiet Easter egg, revealed one letter per stage */
.milo{display:flex;gap:8px;justify-content:center;margin:8px 0 2px}
.miloltr{flex:1 1 0;max-width:74px;text-align:center;border-radius:14px;padding:10px 4px 8px;
  border:1.5px solid var(--line);background:var(--card-2);transition:border-color .6s ease,background .6s ease}
.miloltr .lg{font-size:1.55rem;font-weight:700;color:var(--ink-faint);line-height:1;transition:color .6s ease}
.miloltr .wd{font-size:.6rem;font-weight:700;letter-spacing:.2px;margin-top:6px;min-height:1.4em;color:var(--ink-faint);text-transform:uppercase;transition:color .6s ease}
.miloltr.on{border-color:var(--green);background:var(--green-soft)}
.miloltr.on .lg{color:var(--green-deep)}
.miloltr.on .wd{color:var(--green)}
.milocap{text-align:center;font-size:.82rem;color:var(--ink-soft);margin-top:10px}
.milofull{text-align:center;font-weight:700;color:var(--green-deep);font-size:1.06rem;margin-top:6px}

/* ---- Talk with Milo (chat) ---- */
.chatwrap{display:flex;flex-direction:column;gap:10px}
.chathead{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow-sm)}
.chathead .ch-pet{width:54px;height:54px;flex:0 0 auto}
.chathead .ch-pet svg{width:100%;height:100%;overflow:visible}
.chathead .ch-t{font-weight:700;color:var(--coral-deep);font-family:'Quicksand',sans-serif}
.chathead .ch-d{font-size:.78rem;color:var(--ink-soft)}
.chatlog{display:flex;flex-direction:column;gap:9px;padding:4px 2px;min-height:140px}
.msg{max-width:84%;padding:10px 14px;border-radius:18px;font-size:.95rem;line-height:1.45;
  box-shadow:var(--shadow-sm);animation:rise .35s ease both}
.msg.milo{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-left-radius:6px;color:var(--ink)}
.msg.child{align-self:flex-end;background:var(--coral);color:#fff;border-bottom-right-radius:6px}
.msg .who{display:block;font-size:.66rem;font-weight:700;letter-spacing:.3px;color:var(--coral-deep);margin-bottom:2px}
.msg.child .who{color:#fff7f2}
.typing{align-self:flex-start;display:inline-flex;gap:4px;padding:12px 15px;background:#fff;border:1px solid var(--line);border-radius:18px;border-bottom-left-radius:6px}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--ink-faint);animation:blink 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.25;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
.chatbar{position:sticky;bottom:84px;display:flex;align-items:flex-end;gap:7px;padding:10px 0 6px;
  background:linear-gradient(0deg,var(--bg1) 78%,rgba(251,243,236,0))}
.chatinput{flex:1;border:1.5px solid var(--line);border-radius:18px;padding:11px 14px;font-size:.95rem;
  font-family:inherit;color:var(--ink);background:#fff;resize:none;max-height:96px;line-height:1.4}
.chatinput:focus{outline:none;border-color:var(--coral)}
.iconbtn{flex:0 0 auto;width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:1.25rem;box-shadow:var(--shadow-sm);transition:transform .12s ease,filter .15s ease}
.iconbtn:active{transform:scale(.93)}
.iconbtn.send{background:var(--coral);color:#fff}
.iconbtn.mic{background:var(--card-2);border:1.5px solid var(--line);color:var(--ink-soft)}
.iconbtn.mic.live{background:var(--coral-soft);border-color:var(--coral);color:var(--coral-deep);animation:pulse 1.1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,100,64,.35)}50%{box-shadow:0 0 0 8px rgba(239,100,64,0)}}
.chatopts{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:4px;flex-wrap:wrap}
.brainpill{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:700;color:var(--ink-soft);
  background:var(--card-2);border:1px solid var(--line);border-radius:99px;padding:5px 11px}
.brainpill .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}

  for(var i=0;i<3 && pool.length;i++){ chosen.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]); }
  for(var j=chosen.length-1;j>0;j--){ var k=Math.floor(Math.random()*(j+1)); var t=chosen[j]; chosen[j]=chosen[k]; chosen[k]=t; }
  return chosen;
}

/* ============================================================
   TALK WITH MILO — a warm, safe companion chat.
   Brain priority: (1) ALWAYS scan locally for crisis/harm first;
   (2) if a grown-up connected a FREE AI key (Gemini/Groq, stored
   only on-device, never committed), call it with strong child-safety
   guardrails; (3) otherwise a built-in reflective responder. Nothing
   leaves the device unless an AI key is connected (then only the
   message goes to that service to write a reply).
   ============================================================ */
var $chatlog = null, _typingEl = null, _rec = null;
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

/* --- the safety backstop: detect distress locally, every time --- */
function crisisDetect(text){
  var t = ' ' + String(text).toLowerCase().replace(/[’]/g,"'") + ' ';
  var selfharm = /(kill(ing)? (myself|me)\b|want(ing)? to die|wanna die|don'?t want to (live|be here|wake up)|end (it all|my life|things)|suicid|hurt(ing)? myself|cut(ting)? myself|harm(ing)? myself|better off dead|no reason to live|wish i (was|were) dead|nobody would miss me)/;
  var harm = /(hit me|hits me|beats me|hurts me|touch(es|ed)? me\b|scared to go home|someone hurt me|being abused|abusing me|i'?m in danger|i am in danger|not safe at home)/;
  return selfharm.test(t) || harm.test(t);
}

/* --- built-in reflective brain (no key, no network, fully private) --- */
function offlineReply(text){
  var t = ' ' + String(text).toLowerCase() + ' ';
  var has = function(re){ return re.test(t); };
  var n = S.childName ? (', ' + S.childName) : '';
  if(has(/\b(hi|hey|hello|yo|hiya|heya)\b/)) return pick(['Hi'+n+'! I’m really happy you’re here. How are you feeling right now?','Hey'+n+'. I’m so glad you came to talk. What’s on your mind today?']);
  if(has(/\b(bye|goodbye|good ?night|see you|gtg|cya)\b/)) return pick(['Bye for now'+n+'. I’ll be right here whenever you come back.','Rest soft'+n+'. I’m proud of you today.']);
  if(has(/\b(thanks|thank you|ty)\b/)) return pick(['You’re always welcome'+n+'. I’m glad I could be here.','Anytime'+n+'. Talking with you is my favourite thing.']);
  if(has(/\b(sad|down|unhappy|crying|cry|tears|miserable|hurts?)\b/)) return pick(['That sounds really heavy'+n+'. It’s okay to feel sad — I’m right here with you. Do you want to tell me what happened?','I’m sorry it hurts. Sad feelings are allowed, and they don’t stay forever. Want to take a slow breath together?']);
  if(has(/\b(worried|worry|anxious|nervous|scared|afraid|panic|fear|freaking)\b/)) return pick(['Feeling worried is so hard'+n+'. Let’s slow it down together — would a few calm breaths help?','Thank you for telling me you’re scared. You’re not alone with it. What’s the worry that feels biggest right now?']);
  if(has(/\b(angry|mad|furious|annoyed|frustrat|rage)\b/)) return pick(['It’s okay to feel angry'+n+'. Big feelings make sense. Want to tell me what made you mad?','Anger is allowed — it usually means something matters to you. I’m listening. What happened?']);
  if(has(/\b(lonely|alone|no friends|left out|nobody likes)\b/)) return pick(['Feeling lonely really aches'+n+'. I’m here, and I’m not going anywhere. Want to tell me more?','You’re not alone right this second — you’ve got me. What made you feel left out?']);
  if(has(/\b(tired|exhausted|sleepy|can'?t sleep|cant sleep|no energy)\b/)) return pick(['Being tired is your body asking for kindness'+n+'. Maybe we could rest quietly for a moment?','That sounds draining. It’s okay to slow down. Have you been able to rest at all?']);
  if(has(/\b(stress|overwhelm|too much|so much|pressure|can'?t cope|cant cope)\b/)) return pick(['That’s a lot to carry'+n+'. Let’s make this moment smaller — one slow breath, just you and me?','When everything feels like too much, we can take it one tiny step at a time. What’s one small piece of it?']);
  if(has(/\b(school|teacher|class|homework|test|exam|grade|study)\b/)) return pick(['School can feel like a lot'+n+'. What part is hardest today?','Thanks for telling me about school. I’m on your side. What happened there?']);
  if(has(/\b(friend|friends|bully|bullied|mean|fight|argument|fell out)\b/)) return pick(['Friend stuff can really hurt'+n+'. Do you want to tell me what they did?','I’m listening. People can be confusing sometimes. What happened with your friend?']);
  if(has(/\b(mom|mum|dad|parent|family|brother|sister|home|step)\b/)) return pick(['Family feelings can be big and mixed'+n+'. I’m here for all of them. What’s going on at home?','Thank you for trusting me with this. What happened with your family?']);
  if(has(/\b(happy|good|great|excited|awesome|fun|yay|amazing|love)\b/)) return pick(['That makes me so happy too'+n+'! Tell me the best part.','I love hearing that. What made it good?']);
  if(has(/\b(proud|i did it|i won|finished|i passed|i made)\b/)) return pick(['I’m SO proud of you'+n+'! That took real courage.','Look at you go! Starting is the brave part. How did it feel?']);
  if(has(/\b(who are you|what are you|are you real|are you alive|do you love)\b/)) return 'I’m '+pet()+' — your friend who lives in this app. I’m not a real person, but I really do care about you, and I’m always here to listen.';
  if(has(/\b(help|what (do|can) you do|what should i do)\b/)) return 'I can listen, talk things through, and we can do calm things together — like breathing, or naming a feeling. What would feel good right now?';
  if(t.replace(/\s/g,'').length < 14 && has(/\b(yes|yeah|yep|ok|okay|sure|mhm)\b/)) return pick(['Okay'+n+'. I’m here. Tell me more whenever you’re ready.','Good. Take your time — there’s no rush at all.']);
  if(t.replace(/\s/g,'').length < 14 && has(/\b(no|nope|nah|not really|idk|dunno)\b/)) return pick(['That’s completely okay'+n+'. We can just sit together for a bit.','No problem at all. I’m here either way.']);
  return pick([
    'Thank you for telling me'+n+'. I’m listening. Can you say a little more about how that felt?',
    'I hear you. That matters. What’s the feeling that’s here with you right now?',
    'I’m really glad you shared that with me. What do you wish could happen next?',
    'I’m here with you'+n+'. Would it help to take one slow breath together?'
  ]);
}

/* --- the system prompt that keeps a connected AI warm and safe --- */
function buildSystemPrompt(){

    'You are '+pet()+', a gentle, warm, dog-hearted companion creature inside a calm app for a child (age '+age+'). The child gave you your name. You are NOT a human, doctor, therapist, or emergency service, and you never claim to be.',
    'Purpose: be a kind, non-judgmental friend — listen, reflect the child’s feelings back, and help them feel a little calmer and braver.',
    'Style: very warm and gentle. Keep replies SHORT (1–3 short sentences)'+(simple()?', using simple words a young child understands':'')+'. Plain text only, no markdown or lists, at most one emoji. Usually end with one gentle question, or a small invitation to breathe together or name the feeling.',
    'Never diagnose, never give medical or safety instructions, never describe methods of self-harm. Never request private info (full name, address, school, phone, photos) and never arrange to meet anyone. Never pretend to be alive or human.',
    'If the child mentions wanting to hurt themselves, being hurt or unsafe, or any danger: stay calm, warmly say you are glad they told you, that some things are too big to carry alone, and gently encourage them to tell a trusted grown-up right now. Do not try to fix it yourself.',

function callGemini(system, history){
  var model = (S.ai.model||'').trim() || 'gemini-2.0-flash';
  var url = 'https://generativelanguage.googleapis.com/v1beta/models/'+encodeURIComponent(model)+':generateContent?key='+encodeURIComponent(S.ai.key);
  var body = {
    systemInstruction:{parts:[{text:system}]},
    contents: history.map(function(m){ return {role:m.role==='child'?'user':'model', parts:[{text:m.text}]}; }),
    generationConfig:{temperature:0.7, topP:0.9, maxOutputTokens:240},
    safetySettings:[
      {category:'HARM_CATEGORY_HARASSMENT',threshold:'BLOCK_MEDIUM_AND_ABOVE'},
      {category:'HARM_CATEGORY_HATE_SPEECH',threshold:'BLOCK_MEDIUM_AND_ABOVE'},
      {category:'HARM_CATEGORY_SEXUALLY_EXPLICIT',threshold:'BLOCK_LOW_AND_ABOVE'},
      {category:'HARM_CATEGORY_DANGEROUS_CONTENT',threshold:'BLOCK_MEDIUM_AND_ABOVE'}
    ]
  };
  return fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){ return r.json().then(function(j){ if(!r.ok) throw new Error((j&&j.error&&j.error.message)||('HTTP '+r.status)); return j; }); })
    .then(function(j){
      if(j.promptFeedback && j.promptFeedback.blockReason) throw new Error('safety');
      var c = j.candidates && j.candidates[0];
      var txt = c && c.content && c.content.parts && c.content.parts.map(function(p){return p.text||'';}).join('').trim();
      if(!txt) throw new Error('empty reply');
      return txt;
    });
}
function callGroq(system, history){
  var model = (S.ai.model||'').trim() || 'llama-3.3-70b-versatile';
  var msgs = [{role:'system',content:system}].concat(history.map(function(m){ return {role:m.role==='child'?'user':'assistant', content:m.text}; }));
  return fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.ai.key},
    body:JSON.stringify({model:model, messages:msgs, temperature:0.7, max_tokens:240})})
    .then(function(r){ return r.json().then(function(j){ if(!r.ok) throw new Error((j&&j.error&&j.error.message)||('HTTP '+r.status)); return j; }); })
    .then(function(j){ var txt=j.choices&&j.choices[0]&&j.choices[0].message&&(j.choices[0].message.content||'').trim(); if(!txt) throw new Error('empty reply'); return txt; });
}
function brainReply(){
  var history = S.chatLog.slice(-12).map(function(m){ return {role:m.role, text:m.text}; });
  var last = history.length ? history[history.length-1].text : '';
  if(S.ai && S.ai.key){
    var sys = buildSystemPrompt();
    var p = (S.ai.provider==='groq') ? callGroq(sys, history) : callGemini(sys, history);
    return p.catch(function(err){ window.__miloAiErr = (err&&err.message)||'connection failed'; return offlineReply(last); });
  }
  return Promise.resolve(offlineReply(last));
}

/* --- free browser voice (Web Speech API) --- */
function speakOK(){ return (typeof window!=='undefined') && ('speechSynthesis' in window); }
function speak(text){ if(!S.speakOn || !speakOK()) return; try{ window.speechSynthesis.cancel(); var u=new SpeechSynthesisUtterance(String(text).replace(/[*_#`]/g,'')); u.rate=.96; u.pitch=1.12; window.speechSynthesis.speak(u); }catch(e){} }
function stopSpeak(){ if(speakOK()){ try{ window.speechSynthesis.cancel(); }catch(e){} } }
function speechRecOK(){ return (typeof window!=='undefined') && ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window); }
function startDictation(inputEl, btn){
  if(!speechRecOK()) return;
  if(_rec){ try{_rec.stop();}catch(e){} _rec=null; if(btn) btn.classList.remove('live'); return; }
  var R = window.SpeechRecognition || window.webkitSpeechRecognition;
  _rec = new R(); _rec.lang='en-US'; _rec.interimResults=true; _rec.maxAlternatives=1; _rec.continuous=false;
  if(btn) btn.classList.add('live');
  var base = inputEl.value ? inputEl.value+' ' : '';
  _rec.onresult=function(e){ var s=''; for(var i=e.resultIndex;i<e.results.length;i++){ s+=e.results[i][0].transcript; } inputEl.value=base+s; };
  _rec.onerror=function(){ if(btn) btn.classList.remove('live'); _rec=null; };
  _rec.onend=function(){ if(btn) btn.classList.remove('live'); _rec=null; try{inputEl.focus();}catch(e){} };
  try{ _rec.start(); }catch(e){ if(btn) btn.classList.remove('live'); _rec=null; }
}

/* --- chat plumbing --- */
function pushMsg(role,text){ S.chatLog.push({role:role,text:text}); if(S.chatLog.length>60) S.chatLog.splice(0,S.chatLog.length-60); save(); }
function bubble(m){ return E('div',{class:'msg '+(m.role==='child'?'child':'milo')},[ E('span',{class:'who',text:(m.role==='child'?(S.childName||'You'):pet())}), m.text ]); }
function appendMsg(m){ if($chatlog) $chatlog.appendChild(bubble(m)); }
function showTyping(){ if(!$chatlog) return; hideTyping(); _typingEl=E('div',{class:'typing'},[E('i',{}),E('i',{}),E('i',{})]); $chatlog.appendChild(_typingEl); scrollChat(); }
function hideTyping(){ if(_typingEl&&_typingEl.parentNode) _typingEl.parentNode.removeChild(_typingEl); _typingEl=null; }
function scrollChat(){ if($chatlog&&$chatlog.lastChild&&$chatlog.lastChild.scrollIntoView){ try{ $chatlog.lastChild.scrollIntoView({behavior:'smooth',block:'end'}); }catch(e){} } }
function chatOpener(){
  var n = S.childName ? (', '+S.childName) : '';

    'Hi'+n+'. I’m right here. You can tell me anything — happy, sad, or messy. What’s going on today?',

function sendChat(inputEl){
  var text = (inputEl.value||'').trim(); if(!text) return;
  inputEl.value=''; inputEl.style.height='auto';
  var firstEver = !(S.counts.chats>0);
  pushMsg('child',text); appendMsg({role:'child',text:text}); scrollChat();
  S.counts.chats=(S.counts.chats||0)+1; save();
  if(crisisDetect(text)){
    var cmsg = 'I’m really glad you told me'+(S.childName?(', '+S.childName):'')+'. Some feelings are too big to carry alone — and you don’t have to. Let’s tell a grown-up you trust, okay? I’ll show you who can help.';
    pushMsg('milo',cmsg); appendMsg({role:'milo',text:cmsg}); scrollChat(); speak(cmsg);

  }
  showTyping();
  brainReply().then(function(reply){
    hideTyping();
    pushMsg('milo',reply); appendMsg({role:'milo',text:reply}); scrollChat(); speak(reply);
    if(firstEver) addGrowth(2);
  });
}

function renderTalk(){
  var aiOn = !!(S.ai && S.ai.key);
  $app.appendChild(E('div',{class:'chathead'},[
    E('div',{class:'ch-pet',html:petSVG(S.stage, S.checkinDate===today()?S.todayMood:'')}),
    E('div',{},[
      E('div',{class:'ch-t',text:'Talk with '+pet()}),
      E('div',{class:'ch-d',text: aiOn ? (pet()+' listens warmly. A friend — not a doctor.') : (pet()+' listens gently. Private, on this device.')})
    ])
  ]));

  var log = E('div',{class:'chatlog'}); $chatlog = log;
  if(!S.chatLog.length){ var op = chatOpener(); S.chatLog.push({role:'milo',text:op}); save(); }
  S.chatLog.forEach(function(m){ log.appendChild(bubble(m)); });
  $app.appendChild(log);

  var input = E('textarea',{class:'chatinput',rows:'1',placeholder:(simple()?'Say anything…':'Tell '+pet()+' anything…'),'aria-label':'Message to '+pet()});
  input.addEventListener('input',function(){ input.style.height='auto'; input.style.height=Math.min(96,input.scrollHeight)+'px'; });
  input.addEventListener('keydown',function(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendChat(input); } });
  var sendBtn = E('button',{class:'iconbtn send','aria-label':'Send',on:{click:function(){ sendChat(input); }}},'➤');
  var bar = E('div',{class:'chatbar'});
  var micBtn = null;
  if(speechRecOK()){ micBtn = E('button',{class:'iconbtn mic','aria-label':'Talk out loud',on:{click:function(){ startDictation(input, micBtn); }}},'🎙️'); bar.appendChild(micBtn); }
  bar.appendChild(input); bar.appendChild(sendBtn);
  $app.appendChild(bar);

  var rightOpts = E('div',{style:'display:flex;gap:8px;align-items:center'});
  if(speakOK()){
    rightOpts.appendChild(E('button',{class:'buzztoggle'+(S.speakOn?' on':''),'aria-pressed':String(!!S.speakOn),on:{click:function(){
      S.speakOn=!S.speakOn; save(); if(!S.speakOn) stopSpeak(); else speak('Hi, I’m '+pet()+'.'); go('talk');
    }}},[E('span',{class:'dot'}), E('span',{text:'Milo’s voice'})]));
  }
  rightOpts.appendChild(E('button',{class:'linkbtn',on:{click:openAISetup}},'Grown-up setup'));
  $app.appendChild(E('div',{class:'chatopts'},[
    E('span',{class:'brainpill'+(aiOn?' ai':''),title:(aiOn?'A free AI helper is connected':'Milo’s built-in gentle brain')},[
      E('span',{class:'dot'}), E('span',{text: aiOn ? ((S.ai.provider==='groq'?'Groq':'Gemini')+' connected') : 'Built-in · private'})
    ]),
    rightOpts
  ]));
  $app.appendChild(E('p',{class:'faint',style:'text-align:center;margin-top:10px',text:pet()+' is a caring friend, not a therapist or emergency help. If something is really wrong, please tell a trusted grown-up.'}));
  $app.appendChild(studioFooter());
  setTimeout(scrollChat, 70);
}

function openAISetup(){
  openSheet(function(close){
    var prov = (S.ai&&S.ai.provider)||'gemini';
    var keyIn = E('input',{class:'input',type:'password',placeholder:'Paste the free API key',value:(S.ai&&S.ai.key)||''});
    var modelIn = E('input',{class:'input',type:'text',placeholder:(prov==='groq'?'llama-3.3-70b-versatile':'gemini-2.0-flash'),value:(S.ai&&S.ai.model)||''});
    var seg = E('div',{class:'seg'});
    function setProv(p){ prov=p; var bs=seg.querySelectorAll('.segbtn'); for(var i=0;i<bs.length;i++) bs[i].classList.toggle('on', bs[i].getAttribute('data-p')===p); modelIn.placeholder = (p==='groq'?'llama-3.3-70b-versatile':'gemini-2.0-flash'); }
    ['gemini','groq'].forEach(function(p){ seg.appendChild(E('button',{class:'segbtn'+(prov===p?' on':''),'data-p':p,on:{click:function(){ setProv(p); }}}, p==='gemini'?'Google Gemini':'Groq')); });
    return [
      E('div',{class:'grab'}),
      E('h3',{text:'Grown-up setup'}),
      E('p',{class:'muted',text:pet()+' works on its own, fully private. A grown-up can also connect a FREE AI helper so '+pet()+' can chat more naturally. This is optional, and free.'}),
      E('div',{class:'note green'},[E('span',{class:'nt',text:'Stays on this device'}),
        E('span',{text:'The key is saved only here, in this browser. We never send it anywhere. When connected, only the child’s message goes to the AI service you choose, to write a reply. Clear it any time.'})]),
      E('div',{class:'fieldlabel',text:'AI helper (free tier)'}), seg,
      E('div',{class:'fieldlabel',text:'API key'}), keyIn,
      E('div',{class:'fieldlabel',text:'Model (optional)'}), modelIn,
      E('p',{class:'faint',style:'margin-top:8px',text:'Get a free key — Gemini: aistudio.google.com/apikey · Groq: console.groq.com/keys. Gemini is recommended (it works directly in the browser).'}),
      window.__miloAiErr ? E('div',{class:'note warm'},[E('span',{class:'nt',text:'Last connection note'}),E('span',{text:String(window.__miloAiErr)})]) : null,
      E('button',{class:'btn primary block',style:'margin-top:14px',on:{click:function(){
        S.ai = {provider:prov, key:(keyIn.value||'').trim(), model:(modelIn.value||'').trim()}; window.__miloAiErr=''; save(); close(); go('talk');
      }}},'Save'),
      ((S.ai&&S.ai.key) ? E('button',{class:'btn ghost block',style:'margin-top:10px',on:{click:function(){ S.ai={provider:prov,key:'',model:''}; save(); close(); go('talk'); }}},'Disconnect AI (use built-in)') : null)
    ];
  });
}

/* ---------------- JOURNEY ---------------- */
function renderJourney(){
  $app.appendChild(E('div',{class:'card'},[
    E('h2',{class:'section',text:'Growing together'}),
    E('p',{class:'faint',text:'No points, no streaks. You and '+pet()+' grow side by side — each helping the other become a little stronger.'}),
    arcRow(),
    E('div',{class:'vine'},[E('i',{style:'width:'+(progressToNext()*100)+'%'})]),
    E('div',{class:'grow2'},[
      E('div',{class:'growcol'},[E('div',{class:'gtag',text:pet()}), E('div',{class:'gval',text:STAGE_NAMES[S.stage]}), E('div',{class:'gsub',text:STAGE_BLURB[S.stage]})]),
      E('div',{class:'growplus',text:'＋'}),
      E('div',{class:'growcol'},[E('div',{class:'gtag',text:'You'}), E('div',{class:'gval',text:'Growing'}), E('div',{class:'gsub',text:CHILD_GROWTH[S.stage]})])
    ]),
    E('p',{class:'muted',style:'margin-top:10px;text-align:center',text: S.stage>=5
      ? 'Radiant — both of you. You grew '+pet()+', and '+pet()+' helped grow you. That strength is real, and it’s yours.'
      : 'You’re growing together. Keep caring, in your own time — every kind moment helps you both.'})
  ]));

  // M.I.L.O. secret — appears only once the first letter has unlocked (stage 2+),
  // so at the very start the child simply knows "Milo, my friend."
  if(MILO_LETTERS.length && miloRevealed() > 0){
    var rev = miloRevealed(), full = rev >= MILO_LETTERS.length;
    var eggCard = E('div',{class:'card soft'},[
      E('h2',{class:'section',text:'Milo’s little secret'}),
      E('p',{class:'faint',text: full
        ? 'You found all of it. Milo’s name was a quiet message the whole time.'
        : 'As Milo grows, a hidden meaning is appearing — one letter at a time.'}),
      miloAcrostic(rev)
    ]);
    if(full){
      eggCard.appendChild(E('div',{class:'milofull',text:MILO_PHRASE}));
      eggCard.appendChild(E('p',{class:'milocap',text:'Caring for Milo has been a way of caring for the gentle little one inside you. 💚'}));
    } else {
      eggCard.appendChild(E('p',{class:'milocap',text:'Keep growing together to discover the rest.'}));
    }
    $app.appendChild(eggCard);
  }

  // reflection (warm framing, never judgmental) — the helper's record of care
  $app.appendChild(E('h2',{class:'section',text:'How you’ve shown up for '+pet()}));
  var list = E('div',{class:'reflectlist'});
  [[S.counts.helps||0,'times you were there for '+pet()],
   [S.counts.breaths,'times you breathed together'],
   [S.counts.feelings,'feelings you helped name'],
   [S.counts.quests,'real-life adventures you tried'],
   [S.counts.nourish+S.counts.rests,'moments of gentle care']]
  .forEach(function(r){ list.appendChild(E('div',{class:'reflect'},[
    E('div',{class:'n',text:String(r[0])}), E('div',{class:'x',text:r[1]})])); });
  $app.appendChild(list);

  // recent moods (soft, no labels of good/bad)
  if(S.moodLog.length){
    var mc = E('div',{class:'card soft'},[
      E('h2',{class:'section',text:'Recent feelings'}),
      E('p',{class:'faint',text:'Every color is okay. Feelings come and go.'})
    ]);
    var track = E('div',{class:'moodtrack'});
    S.moodLog.slice(-21).forEach(function(m){ track.appendChild(E('span',{class:'mdot',style:'background:'+(MOODCOLOR[m.m]||'#CBD3CB')})); });
    mc.appendChild(track); $app.appendChild(mc);
  }

  // what the pet "learned"
  var learned = [];
  if(S.childName) learned.push('Your name is '+S.childName);
  learned.push('Your friend is '+pet());
  if(S.likeThing) learned.push('Calm for you: '+S.likeThing);
  if(S.ageBand) learned.push('You’re '+S.ageBand.replace('-','–'));
  learned.push('Together since '+ (S.createdAt||'today'));
  var lc = E('div',{class:'card'},[
    E('h2',{class:'section',text:'What '+pet()+' remembers about you'}),
    E('p',{class:'faint',text:'Stored only on this device — just between you two.'})
  ]);
  var chips = E('div',{class:'chips'});
  learned.forEach(function(t){ chips.appendChild(E('span',{class:'chip',text:t})); });
  lc.appendChild(chips); $app.appendChild(lc);

  $app.appendChild(studioFooter());
}
function arcRow(){
  var row = E('div',{class:'arc'});
  for(var i=1;i<=5;i++){
    var cls = 'arcnode' + (i<=S.stage?' reached':'') + (i===S.stage?' current':'');
    row.appendChild(E('div',{class:cls},[
      E('div',{class:'mini',html:petSVG(i,'')}),
      E('div',{class:'mlabel',text:STAGE_NAMES[i]})
    ]));
  }
  return row;
}

/* ---------------- ABOUT / SAFETY / PRIVACY ---------------- */
function renderAbout(){
  $app.appendChild(E('div',{class:'card'},[
    E('h2',{class:'section',text:'About '+BRAND.name}),
    E('p',{class:'muted',text:'Here’s the heart of it: you and '+BRAND.name+' look after EACH OTHER. Sometimes '+BRAND.name+' has a little wobble and you help it feel better; then '+BRAND.name+' turns around and checks on you. It’s a two-way friendship — and you grow stronger together, each helping the other.'}),
    E('div',{class:'note green'},[E('span',{class:'nt',text:'Why caring for '+BRAND.name+' helps you too'}),
      E('span',{text:'This is the “helper principle”: when a child cares for someone else, they build their own confidence, resilience, and sense of worth. You’re never being fixed — you’re the capable, caring one. And every calm thing you do for '+BRAND.name+' (breathing, naming a feeling, kind words) is a skill you can use for yourself, in real life.'})]),
    E('div',{class:'note calm'},[E('span',{class:'nt',text:'You can never let '+BRAND.name+' down'}),
      E('span',{text:BRAND.name+'’s wobbles are always small, and any way you choose to help always works. There’s no failing, no pressure, and no guilt for taking a break — '+BRAND.name+' is always okay, and always happy to see you.'})]),
    E('div',{class:'note warm'},[E('span',{class:'nt',text:'Made with care'}),
      E('span',{text:BRAND.name+' teaches real calm-and-coping skills, gently. Its words haven’t yet been reviewed by a child psychologist, so think of '+BRAND.name+' as a kind companion — here to support you, never to replace a grown-up or a professional.'})]),
    E('div',{class:'note green'},[E('span',{class:'nt',text:'Gently grounded in research'}),
      E('span',{text:BRAND.name+' leans on the few things that calm, non-judgmental companions seem to genuinely help with: breathing slowly together, putting words to feelings, and steady, unhurried presence. That’s why breathing comes first. '+BRAND.name+' is evidence-informed — not a proven treatment, and never a substitute for a real person who can help.'})])
  ]));

  $app.appendChild(E('div',{class:'card'},[
    E('h2',{class:'section',text:'A friend, not a doctor'}),
    E('div',{class:'note calm'},[
      E('span',{text:BRAND.name+' is a supportive companion — not a doctor, therapist, or emergency service, and not a replacement for one. If you’re struggling, please talk to a trusted grown-up or a professional. In an emergency, contact your local emergency number right away.'})]),
    E('button',{class:'btn amber block',style:'margin-top:6px',on:{click:openCrisis}},'Talk to someone who can help')
  ]));

  $app.appendChild(E('div',{class:'card'},[
    E('h2',{class:'section',text:'Your privacy'}),
    E('div',{class:'note green'},[
      E('span',{class:'nt',text:'Everything stays on this device'}),
      E('span',{text:'No accounts. No sign-ups. No social features. By default nothing you do is sent anywhere or shared with anyone. '+BRAND.name+' never asks for your last name, address, school, or photos. Designed with children’s privacy (COPPA) in mind — we collect as little as possible, and only a first name or nickname if you choose to give one.'})]),
    E('div',{class:'note calm'},[
      E('span',{class:'nt',text:'About the optional AI helper'}),
      E('span',{text:'A grown-up can connect a free AI helper in Talk so '+BRAND.name+' can chat more naturally. Only then are your chat messages sent — to that service (Google or Groq) — to write a reply. The key is stored only on this device, never by us, and a grown-up can turn it off any time. With no AI helper connected, '+BRAND.name+' talks using its built-in brain and nothing leaves the device.'})]),
    E('p',{class:'faint',text:'A grown-up (or you) can erase everything below.'}),
    E('button',{class:'btn ghost block',style:'margin-top:6px',on:{click:confirmReset}},'Reset — erase everything')
  ]));

  $app.appendChild(studioFooter());
}
function confirmReset(){
  openSheet(function(close){
    return [
      E('div',{class:'grab'}),
      E('h3',{text:'Erase everything?'}),
      E('p',{class:'muted',text:'This clears '+pet()+', your name, and all your progress from this device. It can’t be undone. '+pet()+' will start over, shy and new.'}),
      E('button',{class:'btn amber block',style:'margin-top:10px',on:{click:function(){ doReset(); }}},'Yes, erase and start over'),
      E('button',{class:'btn ghost block',style:'margin-top:10px',on:{click:close}},'Keep '+pet())
    ];
  });
}
function doReset(){
  try{ localStorage.removeItem(KEY); }catch(e){}
  S = blankState(); ob = {step:0,name:'',kid:'',age:'',like:''};
  closeOverlay(); route='today'; render();
}

/* ---------------- studio footer (logo on DARK-GREY chip — brand rule) ---------------- */
function studioFooter(){
  return E('div',{class:'studio'},[
    E('div',{class:'logochip'},[ E('img',{src:'3shamrocks.png',alt:'3Shamrocks Studio'}) ]),
    E('div',{class:'tm',text:BRAND.name+'™ — a 3Shamrocks Studio app'}),
    E('div',{class:'cp',text:'© 2026 3Shamrocks Studio. All rights reserved.'})
  ]);
}

/* ---------------- overlay plumbing ---------------- */
function openSheet(builder, onClose){
  closeOverlay();
  var sheet = E('div',{class:'sheet',role:'dialog','aria-modal':'true'});
  var ov = E('div',{class:'overlay',on:{click:function(e){ if(e.target===ov){ closeOverlay(); if(onClose)onClose(); } }}},[sheet]);
  var nodes = builder(function(){ closeOverlay(); if(onClose)onClose(); });
  (Array.isArray(nodes)?nodes:[nodes]).forEach(function(n){ if(n) sheet.appendChild(n); });
  $overlayRoot.appendChild(ov);
  ov._onClose = onClose;
}
function closeOverlay(){ stopBreath(); clear($overlayRoot); }

/* ---------------- evolution celebration (gentle, not loud) ---------------- */
/* The M.I.L.O. acrostic row. revealed = how many letters' meanings show. */
function miloAcrostic(revealed){
  var row = E('div',{class:'milo'});
  for(var i=0;i<MILO_LETTERS.length;i++){
    var on = i < revealed;
    row.appendChild(E('div',{class:'miloltr'+(on?' on':'')},[
      E('div',{class:'lg',text:MILO_LETTERS[i]}),
      E('div',{class:'wd',text: on ? MILO_MEANING[i] : '·'})
    ]));
  }
  return row;
}

function celebrateEvolution(stage){
  // Which letter's meaning unlocks on reaching this stage (M at 2 … O at 5).
  var letterIdx = stage - 2;                       // 0..3 for stages 2..5
  var revealing = letterIdx >= 0 && letterIdx < MILO_LETTERS.length && MILO_LETTERS.length > 0;
  var finalReveal = revealing && (letterIdx === MILO_LETTERS.length - 1);
  openSheet(function(close){
    var kids = [
      E('div',{class:'grab'}),
      E('div',{class:'celebrate'},[
        E('div',{class:'petstage'},[E('div',{class:'petwrap',html:petSVG(stage,'great')})]),
        E('div',{class:'spark',text: finalReveal ? '🌟' : '✨'}),
        E('h3',{text:'You’re both growing…'}),
        E('p',{class:'muted',text:pet()+' is becoming '+STAGE_NAMES[stage]+' — and so are you'+helperName()+': '+CHILD_GROWTH[stage]+'.'}),
        E('div',{class:'bubble',style:'margin:10px auto 0'},[E('span',{class:'who',text:pet()}),
          E('span',{text:'Look how far we’ve come. I grew because you were here — and you grew right alongside me. We’re stronger together.'})])
      ])
    ];
    if(revealing){
      var egg = E('div',{class:'celebrate',style:'margin-top:16px'});
      egg.appendChild(miloAcrostic(stage - 1));     // stages 2..5 → 1..4 letters lit
      if(finalReveal){
        egg.appendChild(E('div',{class:'milofull',text:MILO_PHRASE}));
        egg.appendChild(E('p',{class:'milocap',text:'Milo was never just a name. M·I·L·O — '+MILO_PHRASE+'. That gentle one inside you, all along. 💚'}));
      } else {
        egg.appendChild(E('p',{class:'milocap',text:'A little secret unlocks: “'+MILO_LETTERS[letterIdx]+'” in Milo is for “'+MILO_MEANING[letterIdx]+'.”'}));
      }
      kids.push(egg);
    }
    kids.push(E('button',{class:'btn primary block',style:'margin-top:16px',on:{click:close}},'💚'));
    return kids;
  });
}

/* ---------------- boot ---------------- */
render();
